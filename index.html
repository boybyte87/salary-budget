<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية البيت - النسخة الاحترافية الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; transition: background-color 0.5s ease; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Patterns */
        .pattern-dots { background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
        .pattern-grid { background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 30px 30px; }
        .pattern-lines { background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 10px, transparent 10px, transparent 20px); }
        
        .backdrop-blur-xl { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body id="body-main" class="pattern-dots bg-[#1c1c1a] text-[#e0e0e0] min-h-screen">

    <div id="root"></div>

    <!-- React and Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area, Legend } = Recharts;

        const MN = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
        const formatCurrency = (amt) => (amt || 0).toLocaleString('ar-KW') + ' د.ك';

        function App() {
            const [appData, setAppData] = useState(() => {
                const saved = localStorage.getItem('budget_data_pro');
                return saved ? JSON.parse(saved) : { budget: {}, debt: { owe: [], owed: [] } };
            });

            const [theme, setTheme] = useState('dark');
            const [pattern, setPattern] = useState('dots');
            const [curDate, setCurDate] = useState({ y: new Date().getFullYear(), m: new Date().getMonth() });
            const [currentTab, setCurrentTab] = useState('month');
            const [menuOpen, setMenuOpen] = useState(false);

            useEffect(() => {
                localStorage.setItem('budget_data_pro', JSON.stringify(appData));
            }, [appData]);

            // Update Body Classes
            useEffect(() => {
                const body = document.getElementById('body-main');
                const colors = { dark: '#1c1c1a', navy: '#0d1b2a', black: '#000000', gray: '#444444' };
                body.style.backgroundColor = colors[theme];
                body.className = `pattern-${pattern} text-[#e0e0e0] min-h-screen`;
            }, [theme, pattern]);

            const monthKey = `${curDate.y}-${curDate.m}`;
            const mData = appData.budget[monthKey] || { income: [], expense: [], savings: [] };
            
            const mSummary = useMemo(() => {
                const income = mData.income.reduce((s, i) => s + i.amt, 0);
                const expense = mData.expense.reduce((s, i) => s + i.amt, 0);
                const savings = mData.savings.reduce((s, i) => s + i.amt, 0);
                return { income, expense, remaining: income - expense, savings };
            }, [mData]);

            const trendData = useMemo(() => {
                const result = [];
                Object.keys(appData.budget).sort().forEach(key => {
                    const d = appData.budget[key];
                    const [y, m] = key.split('-');
                    const inc = d.income.reduce((s, i) => s + i.amt, 0);
                    const exp = d.expense.reduce((s, i) => s + i.amt, 0);
                    const sav = d.savings.reduce((s, i) => s + i.amt, 0);
                    result.push({ name: MN[m], دخل: inc, مصاريف: exp, مدخرات: sav, متبقي: inc - exp });
                });
                return result;
            }, [appData]);

            const totalActualSavings = useMemo(() => {
                let total = 0;
                Object.values(appData.budget).forEach(m => {
                    total += m.savings.reduce((s, i) => s + i.amt, 0);
                });
                return total;
            }, [appData]);

            const addEntry = (type, name, amt) => {
                const newData = { ...appData };
                if (!newData.budget[monthKey]) newData.budget[monthKey] = { income: [], expense: [], savings: [] };
                newData.budget[monthKey][type].push({ id: Date.now(), name, amt: parseFloat(amt) });
                setAppData(newData);
            };

            const removeEntry = (type, id) => {
                const newData = { ...appData };
                newData.budget[monthKey][type] = newData.budget[monthKey][type].filter(i => i.id !== id);
                setAppData(newData);
            };

            const shareWA = (section) => {
                let text = `*تقرير ${section}*\n📅 ${MN[curDate.m]} ${curDate.y}\n`;
                if(section === 'المدخرات') {
                    text += `\n🎯 إجمالي المدخرات الفعلية: ${formatCurrency(totalActualSavings)}`;
                } else {
                    text += `\n💰 الدخل: ${formatCurrency(mSummary.income)}`;
                    text += `\n💸 المصاريف: ${formatCurrency(mSummary.expense)}`;
                    text += `\n🏦 المتبقي: ${formatCurrency(mSummary.remaining)}`;
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 mb-24">
                    {/* Header */}
                    <header className="sticky top-0 z-40 bg-black/40 backdrop-blur-xl border-b border-white/10 p-4 rounded-2xl mb-8 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white rounded-lg flex items-center justify-center cursor-pointer" onClick={() => setMenuOpen(!menuOpen)}>
                                <span className="text-black font-bold">🏠</span>
                            </div>
                            <div>
                                <h1 className="text-sm font-serif italic leading-none">ميزانية البيت</h1>
                                <span className="text-[9px] opacity-30">Home Budget Pro</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                            <button onClick={() => setCurDate(prev => { let m=prev.m-1, y=prev.y; if(m<0){m=11;y--;} return {y,m}; })} className="opacity-50 hover:opacity-100">›</button>
                            <span className="text-xs font-bold w-24 text-center">{MN[curDate.m]} {curDate.y}</span>
                            <button onClick={() => setCurDate(prev => { let m=prev.m+1, y=prev.y; if(m>11){m=0;y++;} return {y,m}; })} className="opacity-50 hover:opacity-100">‹</button>
                        </div>
                    </header>

                    {/* Menu Modal */}
                    {menuOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60">
                            <div className="bg-[#111] border border-white/10 rounded-[2rem] p-8 w-full max-w-xs text-center shadow-2xl">
                                <h3 className="text-sm font-bold mb-6">تخصيص المظهر</h3>
                                <div className="flex justify-center gap-4 mb-8">
                                    {['dark', 'navy', 'black', 'gray'].map(t => (
                                        <button key={t} onClick={() => {setTheme(t); setMenuOpen(false);}} className={`w-8 h-8 rounded-full border-2 ${theme===t?'border-white':'border-transparent'}`} style={{backgroundColor: t==='dark'?'#1c1c1a':t==='navy'?'#0d1b2a':t==='black'?'#000':'#444'}} />
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-2 mb-8">
                                    {['none', 'dots', 'grid', 'lines'].map(p => (
                                        <button key={p} onClick={() => {setPattern(p); setMenuOpen(false);}} className={`text-[10px] py-2 border rounded-xl ${pattern===p?'bg-white text-black':'border-white/10 opacity-40'}`}>{p}</button>
                                    ))}
                                </div>
                                <button onClick={() => setMenuOpen(false)} className="text-xs opacity-50">إغلاق</button>
                            </div>
                        </div>
                    )}

                    {currentTab === 'month' && (
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                <StatCard label="المدخول" value={mSummary.income} color="text-green-400" />
                                <StatCard label="المصاريف" value={mSummary.expense} color="text-red-400" />
                                <StatCard label="المتبقي" value={mSummary.remaining} color="text-blue-400" subtitle="الدخل - المصاريف" />
                            </div>
                            <ShareRow onShare={() => shareWA('الشهر الحالي')} />
                            <div className="grid md:grid-cols-2 gap-6">
                                <Box title="مصادر الدخل" icon="💰" total={mSummary.income} items={mData.income} onAdd={(n,a) => addEntry('income',n,a)} onRemove={id=>removeEntry('income',id)} color="text-green-400" />
                                <Box title="المصاريف" icon="🛒" total={mSummary.expense} items={mData.expense} onAdd={(n,a) => addEntry('expense',n,a)} onRemove={id=>removeEntry('expense',id)} color="text-red-400" />
                            </div>
                        </div>
                    )}

                    {currentTab === 'overview' && (
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <StatCard label="إجمالي الدخل" value={trendData.reduce((s,d)=>s+d.دخل,0)} color="text-green-400" />
                                <StatCard label="إجمالي المصاريف" value={trendData.reduce((s,d)=>s+d.مصاريف,0)} color="text-red-400" />
                                <StatCard label="المتبقي الكلي" value={trendData.reduce((s,d)=>s+d.دخل-d.مصاريف,0)} color="text-blue-400" />
                                <StatCard label="صافي المدخرات" value={totalActualSavings} color="text-amber-400" subtitle="الادخار الفعلي" />
                            </div>
                            {trendData.length > 0 && (
                                <div className="bg-white/[0.03] border border-white/10 rounded-[2rem] p-6 h-80">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={trendData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(255,255,255,0.05)" />
                                            <XAxis dataKey="name" fontSize={10} stroke="rgba(255,255,255,0.2)" />
                                            <YAxis fontSize={10} stroke="rgba(255,255,255,0.2)" />
                                            <Tooltip contentStyle={{backgroundColor:'#111', border:'none', borderRadius:'12px'}} />
                                            <Area type="monotone" dataKey="دخل" stroke="#1D9E75" fill="#1D9E75" fillOpacity={0.1} />
                                            <Area type="monotone" dataKey="مصاريف" stroke="#D85A30" fill="#D85A30" fillOpacity={0.1} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>
                            )}
                        </div>
                    )}

                    {currentTab === 'savings' && (
                        <div className="space-y-6">
                            <StatCard label="إجمالي مدخراتك الفعلية" value={totalActualSavings} color="text-amber-400" />
                            <ShareRow onShare={() => shareWA('المدخرات')} />
                            <Box title="المدخرات اليدوية" icon="🎯" total={mSummary.savings} items={mData.savings} onAdd={(n,a) => addEntry('savings',n,a)} onRemove={id=>removeEntry('savings',id)} color="text-amber-400" />
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-black/60 backdrop-blur-xl border border-white/10 rounded-full p-2 flex justify-around items-center shadow-2xl">
                        <NavBtn active={currentTab==='month'} onClick={()=>setCurrentTab('month')} label="الشهر" />
                        <NavBtn active={currentTab==='overview'} onClick={()=>setCurrentTab('overview')} label="الإجمالي" />
                        <NavBtn active={currentTab==='savings'} onClick={()=>setCurrentTab('savings')} label="المدخرات" />
                    </nav>
                </div>
            );
        }

        function StatCard({ label, value, color, subtitle }) {
            return (
                <div className={`bg-white/[0.03] border border-white/5 rounded-3xl p-5 flex flex-col justify-between h-36 ${color}`}>
                    <span className="text-[10px] font-bold uppercase tracking-widest opacity-40">{label}</span>
                    <div>
                        <div className="text-xl font-serif italic truncate">{formatCurrency(value)}</div>
                        <div className="text-[9px] opacity-30 mt-1 uppercase">{subtitle || ''}</div>
                    </div>
                </div>
            );
        }

        function Box({ title, icon, total, items, onAdd, onRemove, color }) {
            const [n, setN] = useState('');
            const [a, setA] = useState('');
            return (
                <div className="bg-white/[0.03] border border-white/10 rounded-[2.5rem] overflow-hidden flex flex-col">
                    <div className="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                        <div className="flex items-center gap-3">
                            <span className="opacity-50">{icon}</span>
                            <span className="text-xs font-bold uppercase tracking-widest">{title}</span>
                        </div>
                        <span className="text-xs font-serif italic opacity-40">{formatCurrency(total)}</span>
                    </div>
                    <div className="divide-y divide-white/5 max-h-64 overflow-y-auto custom-scrollbar">
                        {items.length === 0 && <div className="py-12 text-center text-xs opacity-20 italic">لا توجد بيانات...</div>}
                        {items.map(i => (
                            <div key={i.id} className="p-4 flex justify-between items-center hover:bg-white/[0.02] group">
                                <span className="text-xs">{i.name}</span>
                                <div className="flex items-center gap-3 text-xs font-bold">
                                    <span className={color}>{formatCurrency(i.amt)}</span>
                                    <button onClick={()=>onRemove(i.id)} className="text-white/10 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="p-4 bg-white/[0.04] grid grid-cols-1 gap-2">
                        <div className="flex gap-2">
                            <input className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs" placeholder="الاسم" value={n} onChange={e=>setN(e.target.value)} />
                            <input className="w-24 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs" placeholder="0.00" type="number" value={a} onChange={e=>setA(e.target.value)} />
                        </div>
                        <button onClick={()=>{if(n&&a){onAdd(n,a); setN(''); setA('');}}} className="bg-white text-black py-2 rounded-xl text-[10px] font-bold uppercase">إضافة للسجل</button>
                    </div>
                </div>
            );
        }

        function NavBtn({ active, onClick, label }) {
            return (
                <button onClick={onClick} className={`flex-1 py-3 text-[10px] font-bold rounded-full transition-all ${active?'bg-white text-black scale-105 shadow-xl':'text-white/30 hover:text-white'}`}>{label}</button>
            );
        }

        function ShareRow({ onShare }) {
            return (
                <div className="flex justify-between items-center bg-white/[0.03] p-4 border border-white/10 rounded-2xl">
                    <span className="text-[10px] font-bold opacity-30 uppercase tracking-[0.2em]">تصدير التقارير</span>
                    <button onClick={onShare} className="bg-green-600/20 text-green-400 px-6 py-2 rounded-xl border border-green-500/20 text-[10px] font-bold">واتساب</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
