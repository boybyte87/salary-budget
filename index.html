<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميزانية البيت | النسخة الماستر الكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <!-- Firebase Compat SDKs (Essential for single-file auth) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #050505; color: white; margin: 0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .pattern-dots { background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; }
        .backdrop-blur-xl { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .tab-active { background: white !important; color: black !important; font-weight: bold; transform: scale(1.05); }
    </style>
</head>
<body class="pattern-dots min-h-screen">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    // --- Firebase Initialization ---
    const firebaseConfig = {
        apiKey: "AIzaSyDMSFTbFGetq1WsCo-mVsNUbHVcqhC4Tow",
        authDomain: "budget-home-1.firebaseapp.com",
        projectId: "budget-home-1",
        storageBucket: "budget-home-1.firebasestorage.app",
        messagingSenderId: "1082972153053",
        appId: "1:1082972153053:web:ba31f2c4da3cf95e35e734"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    const MN = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    const CATS = ['سكن', 'أكل وشرب', 'تنقل', 'تعليم', 'صحة', 'ترفيه', 'اشتراكات', 'تسوق', 'مدخرات', 'مصاريف متنوعة', 'أخرى'];
    const fmt = (v) => (v || 0).toLocaleString('ar-KW') + ' د.ك';

    function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [appData, setAppData] = useState({ budget: {}, debt: { owe: [], owed: [] } });
        const [curDate, setCurDate] = useState({ y: new Date().getFullYear(), m: new Date().getMonth() });
        const [tab, setTab] = useState('month');

        useEffect(() => {
            return auth.onAuthStateChanged((u) => {
                setUser(u);
                setLoading(false);
                if (u) {
                    const unsub = db.collection('users').doc(u.uid).collection('data').doc('main')
                        .onSnapshot((snap) => {
                            if (snap.exists) {
                                const d = snap.data();
                                setAppData({
                                    budget: JSON.parse(d.budget || '{}'),
                                    debt: JSON.parse(d.debt || '{"owe":[],"owed":[]}')
                                });
                            }
                        });
                    return () => unsub();
                }
            });
        }, []);

        const saveToCloud = async (newData) => {
            if (!user) return;
            await db.collection('users').doc(user.uid).collection('data').doc('main').set({
                budget: JSON.stringify(newData.budget),
                debt: JSON.stringify(newData.debt),
                updated: Date.now()
            });
        };

        const monthKey = `${curDate.y}-${curDate.m}`;
        const mData = appData.budget[monthKey] || { income: [], expense: [], savings: [] };
        
        const summary = useMemo(() => {
            const inc = mData.income.reduce((s, i) => s + i.amt, 0);
            const exp = mData.expense.reduce((s, i) => s + i.amt, 0);
            const sav = mData.savings.reduce((s, i) => s + i.amt, 0);
            return { inc, exp, sav, left: inc - exp };
        }, [mData]);

        const totalSavings = useMemo(() => {
            let t = 0;
            Object.values(appData.budget).forEach(yr => {
                Object.values(yr).forEach(m => {
                    t += (m.savings || []).reduce((s, i) => s + i.amt, 0);
                });
            });
            return t;
        }, [appData]);

        const trendData = useMemo(() => {
            const res = [];
            Object.keys(appData.budget).sort().forEach(k => {
                const parts = k.split('-');
                const d = appData.budget[k];
                res.push({
                    name: MN[parts[1]],
                    دخل: d.income.reduce((s,i)=>s+i.amt,0),
                    صرف: d.expense.reduce((s,i)=>s+i.amt,0)
                });
            });
            return res;
        }, [appData]);

        const add = (type, name, amt, cat) => {
            const newData = { ...appData };
            if (!newData.budget[monthKey]) newData.budget[monthKey] = { income: [], expense: [], savings: [] };
            newData.budget[monthKey][type].push({ id: Date.now(), name, amt: parseFloat(amt), cat });
            setAppData(newData);
            saveToCloud(newData);
        };

        const del = (type, id) => {
            const newData = { ...appData };
            newData.budget[monthKey][type] = newData.budget[monthKey][type].filter(i => i.id !== id);
            setAppData(newData);
            saveToCloud(newData);
        };

        const exportWA = (sect) => {
            let t = `*تقرير ميزانية البيت (${sect})*\n📅 ${MN[curDate.m]} ${curDate.y}\n`;
            if(sect==='المدخرات الكلية') t += `\n🎯 إجمالي المدخرات الفعلية: ${fmt(totalSavings)}`;
            else t += `\n💰 دخل: ${fmt(summary.inc)}\n💸 مصروف: ${fmt(summary.exp)}\n🏦 متبقي: ${fmt(summary.left)}\n🎯 مدخرات الشهر: ${fmt(summary.sav)}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank');
        };

        const exportExcel = () => {
            const data = [];
            Object.keys(appData.budget).forEach(k => {
                const d = appData.budget[k];
                d.income.forEach(i => data.push({ التاريخ: k, النوع: 'دخل', البند: i.name, المبلغ: i.amt }));
                d.expense.forEach(i => data.push({ التاريخ: k, النوع: 'مصروف', البند: i.name, المبلغ: i.amt, التصنيف: i.cat }));
                d.savings.forEach(i => data.push({ التاريخ: k, النوع: 'ادخار', البند: i.name, المبلغ: i.amt }));
            });
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Budget");
            XLSX.utils.writeFile(wb, `budget_export_${Date.now()}.xlsx`);
        };

        if (loading) return <div className="h-screen flex items-center justify-center italic opacity-30">جاري الاتصال بالسحابة...</div>;

        if (!user) {
            return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#050505] p-6">
                    <div className="bg-white/5 border border-white/10 rounded-[3rem] p-12 text-center max-w-sm w-full shadow-2xl">
                        <div className="text-5xl mb-6">🏠</div>
                        <h1 className="text-2xl font-serif italic mb-2 tracking-tight">ميزانية البيت</h1>
                        <p className="text-white/30 text-[10px] uppercase tracking-widest mb-10">Premium Cloud Sync</p>
                        <button onClick={() => auth.signInWithPopup(googleProvider)} className="w-full bg-white text-black py-4 rounded-2xl font-bold hover:scale-105 transition-transform active:scale-95 shadow-xl">تسجيل الدخول بـ Google</button>
                    </div>
                </div>
            );
        }

        return (
            <div className="max-w-4xl mx-auto p-4 md:p-8 pb-32">
                <header className="flex justify-between items-center mb-10 bg-white/5 p-4 rounded-3xl border border-white/10 backdrop-blur-xl">
                    <div className="flex items-center gap-4">
                        <img src={user.photoURL} className="w-10 h-10 rounded-full border border-white/20" />
                        <div>
                            <div className="text-xs font-bold font-serif italic uppercase">ميزانية {user.displayName}</div>
                            <div className="text-[9px] opacity-30 leading-none">مزامنة سحابية نشطة</div>
                        </div>
                    </div>
                    <div className="flex items-center gap-3 bg-black/50 px-4 py-2 rounded-full border border-white/10 text-xs font-bold">
                        <button onClick={() => setCurDate(p => { let m=p.m-1,y=p.y; if(m<0){m=11;y--} return {y,m}})}>›</button>
                        <span className="w-24 text-center">{MN[curDate.m]} {curDate.y}</span>
                        <button onClick={() => setCurDate(p => { let m=p.m+1,y=p.y; if(m>11){m=0;y++} return {y,m}})}>‹</button>
                    </div>
                </header>

                {tab === 'month' && (
                    <div className="space-y-6">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <Stat label="المدخول" val={summary.inc} color="text-green-400" />
                            <Stat label="المصاريف" val={summary.exp} color="text-red-400" />
                            <Stat label="المتبقي" val={summary.left} color="text-blue-400" sub="الدخل - الصرف" />
                            <Stat label="مدخرات الشهر" val={summary.sav} color="text-amber-400" />
                        </div>
                        <div className="flex justify-between items-center bg-white/5 border border-white/10 p-4 rounded-2xl">
                             <button onClick={exportExcel} className="text-[10px] text-white/40 hover:text-white transition-colors uppercase font-bold tracking-widest px-2">تصدير Excel</button>
                             <button onClick={() => exportWA('الشهر الحالي')} className="bg-green-600/20 text-green-400 px-6 py-2 rounded-xl text-[10px] font-bold border border-green-500/20">واتساب الشهر</button>
                        </div>
                        <div className="grid md:grid-cols-2 gap-8">
                            <Box title="مصادر الدخل" items={mData.income} total={summary.inc} color="text-green-400" onAdd={(n,a)=>add('income',n,a)} onDel={id=>del('income',id)} />
                            <Box title="المصاريف" items={mData.expense} total={summary.exp} color="text-red-400" onAdd={(n,a,c)=>add('expense',n,a,c)} onDel={id=>del('expense',id)} hasCat />
                        </div>
                    </div>
                )}

                {tab === 'savings' && (
                    <div className="space-y-6">
                        <Stat label="صافي المدخرات الكلي" val={totalSavings} color="text-amber-400" sub="مجموع كافة الشهور السحابية" large />
                        <div className="flex justify-between items-center bg-white/5 border border-white/10 p-4 rounded-2xl">
                             <span className="text-[10px] font-bold opacity-30 tracking-[0.2em] uppercase">تصدير النتائج</span>
                             <button onClick={() => exportWA('المدخرات الكلية')} className="bg-green-600/20 text-green-400 px-6 py-2 rounded-xl border border-green-500/20 text-[10px] font-bold">واتساب المدخرات</button>
                        </div>
                        <Box title="قسم المدخرات اليدوية" items={mData.savings} total={summary.sav} color="text-amber-400" onAdd={(n,a)=>add('savings',n,a)} onDel={id=>del('savings',id)} />
                    </div>
                )}

                {tab === 'overview' && (
                    <div className="space-y-6">
                         {trendData.length > 0 && (
                            <div className="bg-white/5 border border-white/10 rounded-[3rem] p-6 h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={trendData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(255,255,255,0.05)" />
                                        <XAxis dataKey="name" fontSize={10} stroke="rgba(255,255,255,0.1)" />
                                        <YAxis fontSize={10} stroke="rgba(255,255,255,0.1)" />
                                        <Tooltip contentStyle={{backgroundColor:'#000', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'12px'}} />
                                        <Area type="monotone" dataKey="دخل" stroke="#4ade80" fill="#4ade80" fillOpacity={0.05} />
                                        <Area type="monotone" dataKey="صرف" stroke="#f87171" fill="#f87171" fillOpacity={0.05} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        )}
                        <button onClick={() => auth.signOut()} className="w-full bg-red-500/5 text-red-500 py-4 rounded-3xl border border-red-500/10 text-sm font-bold mt-12 transition-colors hover:bg-red-500/10 uppercase tracking-widest">تسجيل الخروج</button>
                    </div>
                )}

                <footer className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-black/60 backdrop-blur-xl border border-white/10 rounded-full p-2 flex justify-around items-center shadow-2xl z-50">
                    <NavBtn act={tab==='month'} click={()=>setTab('month')} label="الشهر" icon="🏠" />
                    <NavBtn act={tab==='savings'} click={()=>setTab('savings')} label="المدخرات" icon="🎯" />
                    <NavBtn act={tab==='overview'} click={()=>setTab('overview')} label="الإجمالي" icon="📊" />
                </footer>
            </div>
        );
    }

    function Stat({ label, val, color, sub, large }) {
        return (
            <div className={`bg-white/[0.03] border border-white/5 rounded-[2rem] p-5 flex flex-col justify-between transition-transform hover:scale-[1.02] ${large?'h-48':'h-36'}`}>
                <span className="text-[9px] font-bold opacity-30 uppercase tracking-widest">{label}</span>
                <div>
                   <div className={`text-xl font-serif italic truncate ${color} ${large?'text-4xl':''}`}>{fmt(val)}</div>
                   {sub && <div className="text-[9px] opacity-10 uppercase mt-1 tracking-tight">{sub}</div>}
                </div>
            </div>
        );
    }

    function Box({ title, items, total, onAdd, onDel, color, hasCat }) {
        const [n, setN] = useState('');
        const [a, setA] = useState('');
        const [c, setC] = useState(CATS[1]);
        return (
            <div className="bg-white/[0.03] border border-white/10 rounded-[2.5rem] overflow-hidden flex flex-col shadow-lg">
                <div className="p-6 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                    <span className="text-xs font-bold uppercase tracking-widest opacity-80">{title}</span>
                    <span className="text-xs opacity-30 font-serif italic tracking-tighter">{fmt(total)}</span>
                </div>
                <div className="divide-y divide-white/5 max-h-64 overflow-y-auto custom-scrollbar">
                    {items.length === 0 && <div className="py-12 text-center text-xs opacity-10 italic tracking-widest">لا توجد سجلات...</div>}
                    {items.map(i => (
                        <div key={i.id} className="p-4 flex justify-between items-center hover:bg-white/[0.02] group transition-all">
                            <div>
                                <div className="text-xs">{i.name}</div>
                                {i.cat && <div className="text-[9px] opacity-20 uppercase">{i.cat}</div>}
                            </div>
                            <div className="flex items-center gap-3">
                                <span className={`text-[11px] font-bold font-serif italic ${color}`}>{fmt(i.amt)}</span>
                                <button onClick={()=>onDel(i.id)} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity text-[10px] p-1">✕</button>
                            </div>
                        </div>
                    ))}
                </div>
                <div className="p-4 bg-white/[0.05] flex flex-col gap-2">
                    <div className="flex gap-2">
                        <input className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none" placeholder="البند" value={n} onChange={e=>setN(e.target.value)} />
                        <input className="w-24 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none" placeholder="0" type="number" value={a} onChange={e=>setA(e.target.value)} />
                    </div>
                    {hasCat && (
                        <select className="bg-black border border-white/10 rounded-xl px-4 py-2 text-xs opacity-50 outline-none" value={c} onChange={e=>setC(e.target.value)}>
                            {CATS.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    )}
                    <button onClick={()=>{if(n&&a){onAdd(n,a,hasCat?c:undefined);setN('');setA('')}}} className="bg-white text-black py-2 rounded-xl text-[10px] font-bold uppercase tracking-[0.1em] shadow-lg active:scale-95 transition-transform">إضافة السجل</button>
                </div>
            </div>
        );
    }

    function NavBtn({ act, click, label, icon }) {
        return (
            <button onClick={click} className={`flex-1 flex flex-col items-center gap-1 py-2.5 rounded-full transition-all duration-300 ${act?'tab-active shadow-2xl':'text-white/20 hover:text-white'}`}>
                <span className="text-base">{icon}</span>
                <span className="text-[9px] font-bold uppercase tracking-tighter">{label}</span>
            </button>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
